name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Run tests
      run: cargo test --verbose

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Check formatting
      run: cargo fmt --check

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: dev-purge-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: dev-purge-windows-x64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            name: dev-purge-macos-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: dev-purge-linux-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: rust/target/${{ matrix.target }}/release/dev-purge${{ contains(matrix.name, '.exe') && '.exe' || '' }}


  zig-build:
    name: Build Zig Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            name: dev-purge-scout-linux-x64
          - os: ubuntu-latest
            target: aarch64-linux
            name: dev-purge-scout-linux-arm64
          - os: windows-latest
            target: x86_64-windows
            name: dev-purge-scout-windows-x64.exe
          - os: macos-latest
            target: x86_64-macos
            name: dev-purge-scout-macos-x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Zig release
      run: |
        cd zig
        zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

    - name: Upload Zig artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: zig/zig-out/bin/dev-purge${{ contains(matrix.name, '.exe') && '.exe' || '' }}

  release:
    name: Create Release
    needs: [test, build-release, zig-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Create release archives
      run: |
        cd artifacts
        for dir in */; do
          if [ -d "$dir" ]; then
            cd "$dir"
            # Extract the actual binary and zip/tar it
            BINARY=$(ls)
            tar -czf "../${dir%/}.tar.gz" "$BINARY"
            cd ..
          fi
        done
        ls -la

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
